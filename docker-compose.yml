version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pm_testing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testing123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: pm_testing
      DB_USERNAME: postgres
      DB_PASSWORD: testing123
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:2fl+KtvkqFk8+Kq+JHq+JHq+JHq+JHq+JHq+JHq+JHq=
      CACHE_DRIVER: array
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html

volumes:
  pgdata:
